name: Refresh Instagram token

on:
  schedule:
    # ogni lunedì alle 05:00 UTC — rinfresca il token ben prima dei 60 giorni
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # Forza le JS actions a girare su Node 24 (Node 20 è deprecato da giugno 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Refresh token & update secret
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/refresh_token.py
