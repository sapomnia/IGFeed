name: Update Instagram feed

on:
  schedule:
    # ogni 6 ore
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false

env:
  # Forza le JS actions a girare su Node 24 (Node 20 è deprecato da giugno 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch Instagram feed
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
        run: python scripts/fetch_instagram.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.json images
          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "chore: update Instagram feed"
            git push
          fi
