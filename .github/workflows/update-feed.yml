name: Update Instagram feed

on:
  schedule:
    # GitHub Actions schedula in UTC e non conosce il DST italiano.
    # Per ottenere "ogni giorno alle 19:00 ora di Roma" tutto l'anno usiamo
    # due slot: 17:00 UTC (= 19:00 CEST, estate) e 18:00 UTC (= 19:00 CET,
    # inverno). Il job "check" qui sotto controlla l'ora reale a Roma e fa
    # girare l'update solo nello slot corretto.
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false

env:
  # Forza le JS actions a girare su Node 24 (Node 20 è deprecato da giugno 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    # Gate anti-DST: gira sempre ma decide se l'update vero deve partire.
    # Manuale (workflow_dispatch) → passa sempre.
    # Schedulato → passa solo se a Roma sono davvero le 19.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.tz.outputs.should_run }}
    steps:
      - name: Check Rome local hour
        id: tz
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run: proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ=Europe/Rome date +%H)
          echo "Current hour in Rome: $hour"
          if [ "$hour" = "19" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Non è ancora/già le 19:00 a Roma, skip."
          fi

  update:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch Instagram feed
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
        run: python scripts/fetch_instagram.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.json images
          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "chore: update Instagram feed"
            git push
          fi
